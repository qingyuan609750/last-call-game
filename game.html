<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最后一通电话 | The Last Call</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #0a0a1a;
    --bg-glass: rgba(15, 10, 30, 0.65);
    --bg-glass-light: rgba(20, 15, 40, 0.45);
    --text-primary: #e2e0f0;
    --text-secondary: #8888aa;
    --text-dim: #555570;
    --neon-purple: #c084fc;
    --neon-purple-dim: #a855f7;
    --neon-amber: #f59e0b;
    --neon-blue: #6366f1;
    --neon-green: #22c55e;
    --neon-red: #ef4444;
    --neon-pink: #ec4899;
    --border-glass: rgba(192, 132, 252, 0.15);
    --border-glass-strong: rgba(192, 132, 252, 0.3);
    --glow-purple: 0 0 20px rgba(192, 132, 252, 0.3), 0 0 40px rgba(192, 132, 252, 0.1);
    --glow-amber: 0 0 20px rgba(245, 158, 11, 0.3), 0 0 40px rgba(245, 158, 11, 0.1);
    --glow-blue: 0 0 20px rgba(99, 102, 241, 0.3);
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Rain CSS Animation ===== */
  .rain-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1; pointer-events: none; overflow: hidden;
  }
  .rain-drop {
    position: absolute; top: -100px;
    width: 1px;
    background: linear-gradient(transparent, rgba(192, 132, 252, 0.15), transparent);
    animation: rainFall linear infinite;
  }
  @keyframes rainFall {
    0% { transform: translateY(-100px); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  /* ===== Scene System ===== */
  .scene {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
  }
  .scene.active { display: flex; animation: fadeIn 0.8s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes breathe { 0%,100% { opacity: 0.15; } 50% { opacity: 0.35; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)} 40%{transform:translateX(3px)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)} }
  @keyframes neonPulse {
    0%, 100% { text-shadow: 0 0 10px rgba(192,132,252,0.5), 0 0 20px rgba(192,132,252,0.3), 0 0 40px rgba(192,132,252,0.2), 0 0 80px rgba(192,132,252,0.1); }
    50% { text-shadow: 0 0 15px rgba(192,132,252,0.8), 0 0 30px rgba(192,132,252,0.5), 0 0 60px rgba(192,132,252,0.3), 0 0 100px rgba(192,132,252,0.15); }
  }
  @keyframes neonPulseAmber {
    0%, 100% { text-shadow: 0 0 8px rgba(245,158,11,0.4), 0 0 16px rgba(245,158,11,0.2); }
    50% { text-shadow: 0 0 12px rgba(245,158,11,0.6), 0 0 24px rgba(245,158,11,0.3); }
  }
  @keyframes borderGlow {
    0%, 100% { border-color: rgba(192,132,252,0.2); box-shadow: 0 0 15px rgba(192,132,252,0.05); }
    50% { border-color: rgba(192,132,252,0.4); box-shadow: 0 0 25px rgba(192,132,252,0.1); }
  }
  @keyframes callPulse { 0%{box-shadow:0 0 0 0 rgba(192,132,252,0.4)} 70%{box-shadow:0 0 0 15px rgba(192,132,252,0)} 100%{box-shadow:0 0 0 0 rgba(192,132,252,0)} }
  @keyframes floatUp { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  .screen-shake { animation: shake 0.3s ease; }

  /* ===== Glass Panel ===== */
  .glass-panel {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glass);
    border-radius: 16px;
  }
  .glass-panel-light {
    background: var(--bg-glass-light);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
  }

  /* ===== TITLE SCREEN ===== */
  #title-scene {
    background: url('/workspace/assets/bg-game.jpg') center/cover no-repeat;
    background-color: var(--bg-dark);
  }
  #title-scene::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,26,0.7) 0%, rgba(10,10,26,0.4) 40%, rgba(10,10,26,0.8) 100%);
    z-index: 0;
  }
  #title-scene::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(192,132,252,0.015) 2px, rgba(192,132,252,0.015) 4px);
    z-index: 0; pointer-events: none;
  }

  .title-container {
    text-align: center; z-index: 2; animation: slideUp 1.2s ease;
    padding: 20px;
  }
  .title-tag {
    display: inline-block; padding: 4px 16px;
    background: rgba(192,132,252,0.1);
    border: 1px solid rgba(192,132,252,0.2);
    border-radius: 20px; font-size: 10px;
    color: var(--neon-purple); letter-spacing: 3px;
    margin-bottom: 28px; text-transform: uppercase;
  }
  .title-main {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 7vw, 64px);
    font-weight: 700; margin-bottom: 8px; line-height: 1.3;
    color: var(--text-primary);
    animation: neonPulse 3s ease-in-out infinite;
  }
  .title-en {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px; letter-spacing: 6px;
    color: var(--text-dim); margin-bottom: 24px;
    text-transform: uppercase;
  }
  .title-line {
    width: 60px; height: 1px; margin: 0 auto 24px;
    background: linear-gradient(90deg, transparent, var(--neon-purple), transparent);
  }
  .title-desc {
    font-size: 14px; color: var(--text-secondary);
    max-width: 400px; margin: 0 auto 40px;
    line-height: 2; font-weight: 300;
  }
  .title-menu {
    display: flex; flex-direction: column; gap: 12px;
    align-items: center;
  }
  .title-btn {
    display: flex; align-items: center; justify-content: center;
    width: 240px; padding: 14px 0;
    background: rgba(192,132,252,0.06);
    border: 1px solid rgba(192,132,252,0.2);
    border-radius: 10px; color: var(--neon-purple);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px; cursor: pointer;
    transition: all 0.3s; letter-spacing: 4px;
    position: relative; overflow: hidden;
  }
  .title-btn:hover {
    background: rgba(192,132,252,0.12);
    border-color: rgba(192,132,252,0.5);
    box-shadow: var(--glow-purple);
    transform: translateY(-1px);
  }
  .title-btn.primary {
    background: linear-gradient(135deg, rgba(192,132,252,0.15), rgba(99,102,241,0.15));
    border-color: rgba(192,132,252,0.4);
    animation: borderGlow 2.5s ease-in-out infinite;
  }
  .title-btn.primary:hover {
    background: linear-gradient(135deg, rgba(192,132,252,0.25), rgba(99,102,241,0.25));
  }
  .title-btn::after {
    content: ''; position: absolute; inset: -2px;
    border: 1px solid rgba(192,132,252,0.08);
    border-radius: 12px; pointer-events: none;
  }
  .title-version {
    margin-top: 40px; font-size: 11px;
    color: var(--text-dim); letter-spacing: 2px;
  }
  .title-hint {
    margin-top: 12px; font-size: 10px;
    color: rgba(136,136,170,0.4); animation: pulse 3s infinite;
  }

  /* ===== PROLOGUE SCENE ===== */
  #prologue-scene {
    background: url('/workspace/assets/bg-game.jpg') center/cover no-repeat;
    background-color: var(--bg-dark);
  }
  #prologue-scene::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,26,0.85) 0%, rgba(10,10,26,0.6) 50%, rgba(10,10,26,0.9) 100%);
    z-index: 0;
  }

  .prologue-wrap {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 40px; position: relative; z-index: 2;
  }
  .prologue-ch {
    font-family: 'Noto Serif SC', serif;
    font-size: 11px; letter-spacing: 8px;
    margin-bottom: 8px; transition: all 0.8s;
    text-transform: uppercase;
  }
  .prologue-ch.her { color: var(--neon-amber); }
  .prologue-ch.his { color: var(--neon-blue); }
  .prologue-sp {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px; font-weight: 600;
    margin-bottom: 28px; transition: all 0.8s;
  }
  .prologue-sp.her { color: var(--neon-amber); text-shadow: 0 0 20px rgba(245,158,11,0.2); }
  .prologue-sp.his { color: var(--neon-blue); text-shadow: 0 0 20px rgba(99,102,241,0.2); }
  .prologue-body {
    max-width: 540px; width: 100%; min-height: 180px;
  }
  .prologue-line {
    font-size: 14.5px; line-height: 2.4;
    color: var(--text-primary); font-weight: 300;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.7s ease, transform 0.7s ease;
    display: block; margin-bottom: 2px;
  }
  .prologue-line.show { opacity: 1; transform: translateY(0); }
  .prologue-dots {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%); display: flex; gap: 8px;
  }
  .prologue-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.08); transition: all 0.4s;
  }
  .prologue-dots span.on { background: var(--neon-purple); transform: scale(1.3); box-shadow: 0 0 8px rgba(192,132,252,0.4); }
  .prologue-dots span.done { background: rgba(192,132,252,0.25); }
  .prologue-skip {
    position: absolute; bottom: 24px; right: 28px;
    font-size: 11px; color: rgba(136,136,170,0.4);
    cursor: pointer; padding: 6px 16px;
    border: 1px solid rgba(192,132,252,0.15);
    border-radius: 6px; background: rgba(10,10,26,0.5);
    backdrop-filter: blur(8px);
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.3s; z-index: 30;
  }
  .prologue-skip:hover { color: var(--neon-purple); border-color: rgba(192,132,252,0.3); }

  /* ===== GAME SCENE ===== */
  #game-scene {
    flex-direction: column; padding: 0;
    background: url('/workspace/assets/bg-game.jpg') center/cover no-repeat;
    background-color: var(--bg-dark);
  }
  #game-scene::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,26,0.88) 0%, rgba(10,10,26,0.7) 50%, rgba(10,10,26,0.92) 100%);
    z-index: 0;
  }

  /* Call Bar */
  .call-bar {
    width: 100%; padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,26,0.8);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(192,132,252,0.1);
    z-index: 20; position: relative;
  }
  .call-info { display: flex; align-items: center; gap: 10px; }
  .call-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: url('/workspace/assets/character-her.jpg') center/cover no-repeat;
    border: 2px solid rgba(192,132,252,0.3);
    box-shadow: 0 0 10px rgba(192,132,252,0.15);
    flex-shrink: 0;
  }
  .call-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .call-status { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
  .call-status .dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--neon-green);
    box-shadow: 0 0 6px rgba(34,197,94,0.5);
    animation: pulse 2s infinite;
  }
  .call-right { display: flex; align-items: center; gap: 12px; }
  .call-timer {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px; color: var(--neon-purple);
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(192,132,252,0.3);
  }
  .call-round {
    font-size: 10px; color: var(--text-dim);
    text-align: right; margin-top: 2px;
  }
  .call-actions { display: flex; gap: 6px; }
  .call-action-btn {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(192,132,252,0.06);
    border: 1px solid rgba(192,132,252,0.12);
    color: var(--text-dim); font-size: 14px;
    cursor: pointer; transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .call-action-btn:hover { color: var(--neon-purple); border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.1); }
  .call-action-btn.active { color: var(--neon-purple); border-color: rgba(192,132,252,0.4); background: rgba(192,132,252,0.15); }

  /* HUD */
  .game-hud {
    width: 100%; padding: 8px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,26,0.6);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(192,132,252,0.06);
    z-index: 20; position: relative;
  }
  .hud-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
  }
  .hud-label { color: var(--text-dim); }
  .hud-value { color: var(--neon-amber); font-weight: 500; }
  .hud-value.danger { color: var(--neon-red); }
  .hud-bar {
    width: 80px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.06); overflow: hidden;
  }
  .hud-bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--neon-red), var(--neon-amber));
    transition: width 0.5s ease;
  }

  /* Emotion Strip */
  .emotion-strip {
    width: 100%; height: 2px;
    background: rgba(255,255,255,0.03);
    transition: background 1s ease;
    z-index: 20; position: relative;
  }

  /* Dialogue Area */
  .dialogue-area {
    flex: 1; width: 100%; max-width: 700px;
    margin: 0 auto; padding: 16px 20px 10px;
    overflow-y: auto; display: flex;
    flex-direction: column; gap: 10px;
    scrollbar-width: none; z-index: 5; position: relative;
  }
  .dialogue-area::-webkit-scrollbar { display: none; }

  /* Timestamp */
  .timestamp {
    text-align: center; font-size: 10px;
    color: rgba(136,136,170,0.3);
    padding: 8px 0; animation: slideUp 0.5s ease;
    letter-spacing: 2px;
  }

  /* Messages */
  .msg {
    display: flex; gap: 10px;
    animation: msgFadeIn 0.5s ease forwards;
    max-width: 82%;
  }
  .msg.me { align-self: flex-end; flex-direction: row-reverse; }
  .msg.sys { align-self: center; max-width: 100%; }

  .ava {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
  }
  .ava.her {
    background: url('/workspace/assets/character-her.jpg') center/cover no-repeat;
    border: 1.5px solid rgba(192,132,252,0.25);
    box-shadow: 0 0 8px rgba(192,132,252,0.1);
  }
  .ava.me {
    background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(99,102,241,0.1));
    border: 1.5px solid rgba(99,102,241,0.25);
    color: var(--neon-blue);
    font-size: 10px;
  }

  .bbl {
    padding: 10px 16px; border-radius: 14px;
    font-size: 14px; line-height: 1.8; position: relative;
  }
  .msg.her .bbl {
    background: rgba(192,132,252,0.06);
    border: 1px solid rgba(192,132,252,0.1);
    border-top-left-radius: 4px;
    backdrop-filter: blur(8px);
  }
  .msg.me .bbl {
    background: rgba(99,102,241,0.08);
    border: 1px solid rgba(99,102,241,0.12);
    border-top-right-radius: 4px;
    backdrop-filter: blur(8px);
  }
  .msg.sys .bbl {
    background: transparent; border: none;
    color: var(--text-secondary);
    font-size: 12px; font-style: italic;
    text-align: center; padding: 6px 12px;
  }

  @keyframes msgFadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Typing Dots */
  .typing-dots {
    display: flex; gap: 4px; padding: 10px 16px;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    background: var(--neon-purple);
    border-radius: 50%; opacity: 0.3;
    animation: pulse 1.6s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* Silence */
  .silence {
    font-size: 13px; color: rgba(136,136,170,0.3);
    font-style: italic; padding: 4px 0;
    animation: breathe 3s infinite;
  }

  /* Input Area */
  .input-area {
    width: 100%; padding: 12px 20px 20px;
    background: rgba(10,10,26,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(192,132,252,0.1);
    z-index: 20; position: relative;
  }
  .input-wrap {
    max-width: 700px; margin: 0 auto;
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-box { flex: 1; }
  #user-input {
    width: 100%; padding: 12px 16px;
    background: rgba(192,132,252,0.04);
    border: 1px solid rgba(192,132,252,0.12);
    border-radius: 12px; color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px; outline: none;
    resize: none; min-height: 44px; max-height: 100px;
    transition: all 0.3s; line-height: 1.5;
  }
  #user-input:focus {
    border-color: rgba(192,132,252,0.35);
    box-shadow: 0 0 15px rgba(192,132,252,0.08);
    background: rgba(192,132,252,0.06);
  }
  #user-input::placeholder { color: rgba(136,136,170,0.3); }
  #user-input:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, rgba(192,132,252,0.2), rgba(168,85,247,0.2));
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 12px; color: var(--neon-purple);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: all 0.3s; white-space: nowrap;
    font-weight: 500;
  }
  .send-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, rgba(192,132,252,0.3), rgba(168,85,247,0.3));
    box-shadow: var(--glow-purple);
    transform: translateY(-1px);
  }
  .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  .input-hint {
    text-align: center; font-size: 10px;
    color: rgba(136,136,170,0.25); margin-top: 6px;
    letter-spacing: 1px;
  }

  /* ===== ENDING SCENE ===== */
  #ending-scene {
    background: url('/workspace/assets/bg-game.jpg') center/cover no-repeat;
    background-color: var(--bg-dark);
  }
  #ending-scene::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,26,0.9) 0%, rgba(10,10,26,0.75) 50%, rgba(10,10,26,0.95) 100%);
    z-index: 0;
  }

  .end-wrap {
    text-align: center; max-width: 540px;
    padding: 40px; animation: slideUp 1.2s ease;
    z-index: 2; position: relative;
  }
  .end-icon { font-size: 44px; margin-bottom: 20px; }
  .end-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 600; margin-bottom: 20px; line-height: 1.5;
    color: var(--text-primary);
    text-shadow: 0 0 20px rgba(192,132,252,0.2);
  }
  .end-text {
    font-size: 14px; color: var(--text-secondary);
    line-height: 2.2; margin-bottom: 20px; font-weight: 300;
  }
  .end-root {
    margin: 24px 0; padding: 20px 24px;
    background: rgba(192,132,252,0.04);
    border: 1px solid rgba(192,132,252,0.12);
    border-radius: 12px;
    backdrop-filter: blur(12px);
  }
  .end-root-label {
    font-size: 10px; color: var(--neon-purple);
    letter-spacing: 6px; margin-bottom: 10px;
    text-transform: uppercase;
  }
  .end-root-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px; color: var(--text-primary); line-height: 2;
  }
  .end-stats {
    display: flex; justify-content: center;
    gap: 32px; margin: 24px 0;
  }
  .st-val {

<script>
// ===== Rain CSS Animation =====
(function initRain(){

// ===== Audio System =====
var audioCtx = null;
function initAudio(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
}
function playTone(freq, dur, vol){
  if(!audioCtx) return;
  vol = vol || 0.02;
  try {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e){}
}
function playSendSound(){ playTone(800, 0.08, 0.03); setTimeout(function(){ playTone(1000, 0.08, 0.03); }, 80); }
function playReceiveSound(){ playTone(600, 0.06, 0.02); setTimeout(function(){ playTone(500, 0.1, 0.02); }, 60); }
function playBadSound(){ playTone(200, 0.3, 0.03); }
function playGoodSound(){ playTone(500, 0.15, 0.02); setTimeout(function(){ playTone(700, 0.2, 0.02); }, 150); }

// ===== Background Music (Piano, Am-F-C-G, 2.4s intervals) =====
var bgMusicPlaying = false;
var bgMusicGain = null;
var bgMusicInterval = null;

function startBgMusic(){
  if(bgMusicPlaying || !audioCtx) return;
  bgMusicPlaying = true;
  bgMusicGain = audioCtx.createGain();
  bgMusicGain.gain.value = 0.08;
  bgMusicGain.connect(audioCtx.destination);

  var chords = [
    [220.00, 261.63, 329.63],
    [174.61, 220.00, 261.63],
    [261.63, 329.63, 392.00],
    [196.00, 246.94, 293.66],
  ];
  var highNotes = [
    [440.00, 523.25, 659.25],
    [349.23, 440.00, 523.25],
    [523.25, 659.25, 783.99],
    [392.00, 493.88, 587.33],
  ];
  var melodyNotes = [
    659.25, 587.33, 523.25, 493.88, 440.00, 392.00, 440.00, 523.25,
    587.33, 523.25, 440.00, 392.00, 349.23, 329.63, 392.00, 440.00,
    523.25, 587.33, 659.25, 587.33, 523.25, 440.00, 392.00, 349.23,
    329.63, 392.00, 440.00, 523.25, 493.88, 440.00, 392.00, 329.63
  ];
  var melodyIdx = 0;
  var chordIdx = 0;

  function playNote(freq, startTime, duration, vol){
    if(!audioCtx || !bgMusicPlaying) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();
    osc.type = 'sine';
    osc.frequency.value = freq;
    filter.type = 'lowpass';
    filter.frequency.value = 2500;
    filter.Q.value = 0.8;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.03);
    gain.gain.setValueAtTime(vol * 0.8, startTime + duration * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(bgMusicGain);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
  }

  function playChord(){
    if(!bgMusicPlaying) return;
    var chord = chords[chordIdx % chords.length];
    var high = highNotes[chordIdx % highNotes.length];
    var now = audioCtx.currentTime;
    chord.forEach(function(freq, i){ playNote(freq, now + i * 0.5, 2.0, 0.18); });
    for(var i = 0; i < 4; i++){
      var mNote = melodyNotes[(melodyIdx + i) % melodyNotes.length];
      playNote(mNote, now + i * 0.6 + 0.3, 1.2, 0.07);
    }
    melodyIdx += 4;
    if(Math.random() < 0.4){
      var hNote = high[Math.floor(Math.random() * high.length)];
      playNote(hNote, now + 1.5, 1.5, 0.05);
    }
    if(chordIdx % 2 === 0){
      playNote(chord[0] / 2, now, 2.5, 0.1);
    }
    chordIdx++;
  }

  playChord();
  bgMusicInterval = setInterval(playChord, 2400);
}

function stopBgMusic(){
  bgMusicPlaying = false;
  if(bgMusicInterval) clearInterval(bgMusicInterval);
  if(bgMusicGain){
    try { bgMusicGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 1); } catch(e){}
    setTimeout(function(){
      try { bgMusicGain.disconnect(); } catch(e){}
      bgMusicGain = null;
    }, 1200);
  }
}

function toggleMusic(){
  if(bgMusicPlaying) stopBgMusic();
  else { initAudio(); startBgMusic(); }
  var btn = document.getElementById('music-btn');
  if(btn){
    btn.textContent = bgMusicPlaying ? '♪' : '♪';
    if(bgMusicPlaying) btn.classList.add('active');
    else btn.classList.remove('active');
  }
}

// ===== Call Timer =====
var callSeconds = 0;
var callTimerInterval = null;
function startCallTimer(){
  callSeconds = 0;
  updateCallTimer();
  callTimerInterval = setInterval(function(){
    callSeconds++;
    updateCallTimer();
  }, 1000);
}
function updateCallTimer(){
  var m = Math.floor(callSeconds/60);
  var s = callSeconds%60;
  var baseM = 23, baseS = 17;
  var tm = baseM + m, ts = baseS + s;
  if(ts >= 60){ tm++; ts -= 60; }
  document.getElementById('call-timer').textContent =
    String(tm).padStart(2,'0') + ':' + String(ts).padStart(2,'0');
}
function stopCallTimer(){ if(callTimerInterval) clearInterval(callTimerInterval); }

// ===== Prologue System =====
var prologueData = [

var pTimer = null, pIdx = 0, pLine = 0;
function startPrologue(){
  initAudio();
  switchScene('prologue-scene');
  pIdx = 0; pLine = 0;
  renderDots(); playPScene(0);
}
function renderDots(){
  var c = document.getElementById('p-dots'); c.innerHTML = '';
  prologueData.forEach(function(_, i){
    var s = document.createElement('span'); s.id = 'pd' + i; c.appendChild(s);
  });
}
function updateDots(ci){
  prologueData.forEach(function(_, i){
    var d = document.getElementById('pd' + i);
    if(!d) return;
    d.className = '';
    if(i < ci) d.classList.add('done');
    else if(i === ci) d.classList.add('on');
  });
}
function playPScene(idx){
  if(idx >= prologueData.length){ setTimeout(function(){ startGame(); }, 900); return; }
  pIdx = idx;
  var sc = prologueData[idx];
  updateDots(idx);
  var ch = document.getElementById('p-ch');
  var sp = document.getElementById('p-sp');
  var body = document.getElementById('p-body');
  body.innerHTML = '';
  ch.textContent = sc.ch;
  ch.className = 'prologue-ch ' + sc.t;
  sp.textContent = sc.sp;
  sp.className = 'prologue-sp ' + sc.t;
  ch.style.opacity = '0'; sp.style.opacity = '0';
  setTimeout(function(){ ch.style.opacity = '1'; sp.style.opacity = '1'; }, 100);
  pLine = 0;
  showPLine(sc);
}
function showPLine(sc){
  if(pLine >= sc.lines.length){
    pTimer = setTimeout(function(){ playPScene(pIdx + 1); }, 2200);
    return;
  }
  var body = document.getElementById('p-body');
  var el = document.createElement('span');
  el.className = 'prologue-line';
  el.textContent = sc.lines[pLine];
  body.appendChild(el);
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.classList.add('show'); }); });
  pLine++;
  var d = sc.lines[pLine - 1].length > 18 ? 2400 : 1800;
  pTimer = setTimeout(function(){ showPLine(sc); }, d);
}
function skipPrologue(){ if(pTimer) clearTimeout(pTimer); startGame(); }

// ===== Game Core =====

  G = {

  updateUI();
  startCallTimer();

  try { if(!audioCtx) initAudio(); } catch(e){}
  addTimestamp('23:17');
  try { startBgMusic(); } catch(e){}

  setTimeout(function(){
    typeHerMsg('……喂。', function(){
      setTimeout(function(){
        typeHerMsg('我知道很晚了。但是……', function(){
          setTimeout(function(){
            typeHerMsg('我想了很久，还是决定打给你。', function(){
              setTimeout(function(){

            });
          }, 1800);
        });

}

function typeHerMsg(text, onDone){
  var a = document.getElementById('dialogue-area');
  var typingEl = document.createElement('div');
  typingEl.className = 'msg her';
  typingEl.id = 'typing-indicator';
  typingEl.innerHTML = '<div class="ava her"></div><div class="bbl"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  a.appendChild(typingEl);
  scrollBottom();

  var thinkTime = 800 + text.length * 60 + Math.random() * 500;

  setTimeout(function(){
    var indicator = document.getElementById('typing-indicator');
    if(indicator) indicator.remove();

    var msgEl = document.createElement('div');
    msgEl.className = 'msg her';
    msgEl.innerHTML = '<div class="ava her"></div><div class="bbl">' + text + '</div>';
    a.appendChild(msgEl);
    G.hMsgs.push(text);
    try { playReceiveSound(); } catch(e){}
    scrollBottom();

    if(onDone) onDone();
  }, thinkTime);
}

function scrollBottom(){
  var a = document.getElementById('dialogue-area');
  setTimeout(function(){ a.scrollTop = a.scrollHeight; }, 80);
}

function enableInput(){
  var i = document.getElementById('user-input');
  var b = document.getElementById('send-btn');
  i.disabled = false; b.disabled = false; i.focus();
}
function disableInput(){
  document.getElementById('user-input').disabled = true;
  document.getElementById('send-btn').disabled = true;
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
}

function sendMsg(){
  var input = document.getElementById('user-input');
  var text = input.value.trim();
  if(!text || G.round >= MAX_ROUNDS) return;

  input.value = ''; input.style.height = 'auto';
  disableInput();
  G.round++;
  addPlayerMsg(text);
  playSendSound();
  updateUI();

  var analysis = analyze(text);
  updateEmotion(analysis);
  updateUnderstanding(analysis);
  updatePhase();
  updateEmotionStrip();

  var silenceDelay = 1500 + Math.random() * 1500;

  if(G.round > 2 && Math.random() < 0.3 && G.emotion < 60){
    setTimeout(function(){ addSilence('……'); }, 800);
  }

  if(analysis.neg.length > 0){
    setTimeout(function(){
      document.getElementById('game-scene').classList.add('screen-shake');
      playBadSound();
      setTimeout(function(){ document.getElementById('game-scene').classList.remove('screen-shake'); }, 300);
    }, 600);
  }

  if(analysis.pos.length >= 2 && analysis.neg.length === 0){
    setTimeout(function(){ playGoodSound(); }, 1000);
  }

  setTimeout(function(){
    var resp = genResponse(text, analysis);
    typeHerMsg(resp, function(){
      updateUI();
      if(G.round >= MAX_ROUNDS || G.emotion <= 8 || G.emotion >= 96){
        setTimeout(function(){ showEnding(); }, 2500);
      } else {
        setTimeout(function(){ enableInput(); }, 800);
      }
    });
  }, silenceDelay);
}

// ===== Analysis =====
function analyze(text){
  var r = { pos: [], neg: [], q: text.indexOf('？') >= 0 || text.indexOf('?') >= 0, long: text.length > 25, topics: [] };
  var t = text;

  if(/工作|上班|加班|忙|客户|事业|赚钱|养家/.test(t)){ r.topics.push('work'); G.topics.add('work'); }
  if(/小孩|长不大|成熟|幼稚|任性|矫情|懂事/.test(t)){ r.topics.push('mature'); G.topics.add('mature'); }
  if(/付出|对你好|买了|礼物|钱|花|养/.test(t)){ r.topics.push('effort'); G.topics.add('effort'); }
  if(/吵架|闹|脾气|凶|吼|骂/.test(t)){ r.topics.push('fight'); G.topics.add('fight'); }
  if(/手机|游戏|打排位|刷|看手机/.test(t)){ r.topics.push('phone'); G.topics.add('phone'); }
  if(/朋友|兄弟|出去玩|社交/.test(t)){ r.topics.push('social'); G.topics.add('social'); }
  if(/爱|喜欢|感情|在一起|分手|离开/.test(t)){ r.topics.push('love'); G.topics.add('love'); }
  if(/沟通|说话|聊天|交流|听/.test(t)){ r.topics.push('comm'); G.topics.add('comm'); }
  if(/别人|别的女生|男的|出轨|绿/.test(t)){ r.topics.push('jealousy'); G.topics.add('jealousy'); }
  if(/未来|以后|结婚|打算|规划/.test(t)){ r.topics.push('future'); G.topics.add('future'); }

  var posKW = {
    care:['怎么了','发生什么','担心','在意','心疼','难受','不开心','委屈','辛苦','累了','压力','撑不住','不好受','还好吗','你没事吧','哪里不舒服'],
    listen:['你说','告诉我','我在听','想听','慢慢说','不急','愿意听','你说吧','讲讲','倾诉','聊聊','听着呢','我听着'],
    reflect:['我的错','是我不好','对不起','抱歉','忽略','忽视','没注意','不够','做得不好','没做好','疏忽','粗心','不上心','是我的问题','怪我'],
    understand:['理解','明白','懂','能理解','可以理解','换位','你的感受','你的心情','我懂','我理解你','换位思考'],
    admit:['确实','你说得对','你说得没错','我承认','我有责任','我没有做好','是我的错','你说得有道理','你说到点子上了'],
    change:['改变','改','以后会','不会再','我会努力','给我机会','让我改','重新开始','我想变好'],
    dig:['为什么','原因','真的只是','是不是还有','还有什么','真正','其实','心里','内心','一直','从来','从没','到底','根本'],
    validate:['你有道理','可以理解你','你说的对','难怪','怪不得','你受委屈了','辛苦你了','难怪你会','是我疏忽了']
  };
  var negKW = {
    deny:['你想多了','没那么严重','至于吗','小题大做','太敏感','别闹','无理取闹','矫情','作','任性','你想太多了'],
    blame:['你也是','你也有问题','你为什么不','你自己','你也','你总是','你从来不','你从来没','你还好意思'],
    impatient:['快点说','别绕弯子','有话直说','到底想怎样','能不能','别磨蹭','直接点','说重点','别废话'],
    dismiss:['没事','没什么大不了','过几天就好了','别想了','睡一觉','算了','多大点事','别放在心上','别在意'],
    attack:['你才','你凭什么','你有什么资格','你看看你自己','长不大的小孩'],
    escape:['明天再说','改天聊','现在不想','我累了','我困了','我忙','以后再说','回头再说','不想聊了'],
    guilt:['我对你那么好','我付出了那么多','你知不知道','我为了你','你良心','我对得起你','我付出了']
  };

  for(var cat in posKW){
    var kws = posKW[cat];
    for(var ki = 0; ki < kws.length; ki++){
      if(t.indexOf(kws[ki]) >= 0){ r.pos.push(cat); G.kw.add(cat); break; }
    }
  }
  for(var cat2 in negKW){
    var kws2 = negKW[cat2];
    for(var ki2 = 0; ki2 < kws2.length; ki2++){
      if(t.indexOf(kws2[ki2]) >= 0){ r.neg.push(cat2); break; }
    }
  }
  return r;
}

function updateEmotion(a){
  var d = 0;
  if(a.pos.indexOf('care') >= 0) d += 5;
  if(a.pos.indexOf('listen') >= 0) d += 7;
  if(a.pos.indexOf('reflect') >= 0) d += 8;
  if(a.pos.indexOf('understand') >= 0) d += 7;
  if(a.pos.indexOf('admit') >= 0) d += 9;
  if(a.pos.indexOf('validate') >= 0) d += 10;
  if(a.pos.indexOf('dig') >= 0) d += 5;
  if(a.pos.indexOf('change') >= 0) d += 2;
  if(a.neg.indexOf('deny') >= 0) d -= 14;
  if(a.neg.indexOf('blame') >= 0) d -= 12;
  if(a.neg.indexOf('impatient') >= 0) d -= 13;
  if(a.neg.indexOf('dismiss') >= 0) d -= 15;
  if(a.neg.indexOf('attack') >= 0) d -= 16;
  if(a.neg.indexOf('escape') >= 0) d -= 14;
  if(a.neg.indexOf('guilt') >= 0) d -= 11;
  if(a.pos.length === 0 && a.neg.length === 0) d -= 4;
  if(a.long && a.pos.length > 0) d += 2;
  if(a.q && a.pos.length > 0) d += 2;
  G.emotion = Math.max(0, Math.min(100, G.emotion + d));
}

function updateUnderstanding(a){
  var d = 0;
  if(a.pos.indexOf('dig') >= 0) d += 13;
  if(a.pos.indexOf('understand') >= 0) d += 11;
  if(a.pos.indexOf('reflect') >= 0) d += 9;
  if(a.pos.indexOf('admit') >= 0) d += 11;
  if(a.pos.indexOf('validate') >= 0) d += 13;
  if(a.pos.indexOf('care') >= 0) d += 5;
  if(a.pos.indexOf('listen') >= 0) d += 7;
  if(a.neg.length > 0) d -= 6;
  G.understanding = Math.max(0, Math.min(100, G.understanding + d));
  if(G.understanding >= 60 && !G.rootFound) G.rootFound = true;
}

function updatePhase(){
  if(G.emotion >= 75 && G.phase < 2) G.phase = 2;
  else if(G.emotion >= 55 && G.phase < 1) G.phase = 1;
  if(G.emotion <= 20) G.phase = -1;
}

function updateEmotionStrip(){
  var strip = document.getElementById('emotion-strip');
  if(G.emotion <= 20) strip.style.background = 'linear-gradient(90deg, rgba(99,102,241,0.4), rgba(99,102,241,0.1))';
  else if(G.emotion <= 40) strip.style.background = 'linear-gradient(90deg, rgba(136,136,170,0.2), rgba(136,136,170,0.05))';
  else if(G.emotion <= 60) strip.style.background = 'linear-gradient(90deg, rgba(245,158,11,0.3), rgba(245,158,11,0.05))';
  else if(G.emotion <= 80) strip.style.background = 'linear-gradient(90deg, rgba(34,197,94,0.3), rgba(34,197,94,0.05))';
  else strip.style.background = 'linear-gradient(90deg, rgba(192,132,252,0.5), rgba(192,132,252,0.1))';
}

function updateUI(){
  document.getElementById('round-num').textContent = G.round;
  document.getElementById('remaining').textContent = MAX_ROUNDS - G.round;
  document.getElementById('hud-remaining').textContent = (MAX_ROUNDS - G.round) + '/' + MAX_ROUNDS;
  var pct = ((MAX_ROUNDS - G.round) / MAX_ROUNDS * 100);
  document.getElementById('hud-bar-fill').style.width = pct + '%';
  if(pct <= 25) document.getElementById('hud-remaining').classList.add('danger');
  else document.getElementById('hud-remaining').classList.remove('danger');
  document.getElementById('hud-emotion').textContent = G.emotion;
  document.getElementById('hud-understanding').textContent = G.understanding;
}

function pickNoRepeat(arr, prefix){
  var available = [];
  for(var i = 0; i < arr.length; i++){
    if(!G.usedResp.has(prefix + '_' + i)) available.push({val: arr[i], idx: i});
  }
  if(available.length === 0){
    for(var j = 0; j < arr.length; j++) G.usedResp.delete(prefix + '_' + j);
    return pick(arr);
  }
  var chosen = available[Math.floor(Math.random() * available.length)];
  G.usedResp.add(prefix + '_' + chosen.idx);
  return chosen.val;
}

function pick(a){ return a[Math.floor(Math.random() * a.length)]; }

function genResponse(playerText, analysis){
  var pk = G.phase === -1 ? 'p0' : G.phase === 0 ? 'p0' : G.phase === 1 ? 'p1' : 'p2';
  var ph = R[pk];
  var resp = '';

  // 0. Mood swing (12% chance)
  if(G.round > 3 && Math.random() < 0.12){
    var swing = pick(moodSwings);
    resp = pickNoRepeat(swing.responses, 'swing_' + swing.trigger + '_' + pk);
    if(resp !== G.hMsgs[G.hMsgs.length - 1]){
      G.lastRespKey = resp;
      return resp;
    }
  }

  // 1. Topic-aware responses
  if(analysis.topics.length > 0){
    for(var ti = 0; ti < analysis.topics.length; ti++){
      var topic = analysis.topics[ti];
      var tr = topicResponses[topic];
      if(!tr) continue;

      if(tr.twist && Math.random() < 0.3){
        resp = pickNoRepeat(tr.twist, 'tw_' + topic + '_' + pk);
        if(resp !== G.hMsgs[G.hMsgs.length - 1]){
          G.lastRespKey = resp;
          return resp;
        }
      }

      if(analysis.neg.length > 0 && tr.negative){
        resp = pickNoRepeat(tr.negative, 'tn_' + topic + '_' + pk);
        if(resp !== G.hMsgs[G.hMsgs.length - 1]){
          G.lastRespKey = resp;
          return resp;
        }
      }
      if(analysis.pos.length > 0 && tr.positive){
        resp = pickNoRepeat(tr.positive, 'tp_' + topic + '_' + pk);
        if(resp !== G.hMsgs[G.hMsgs.length - 1]){
          G.lastRespKey = resp;
          return resp;
        }
      }
      if(tr.responses){
        resp = pickNoRepeat(tr.responses, 'tr_' + topic + '_' + pk);
        if(resp !== G.hMsgs[G.hMsgs.length - 1]){
          G.lastRespKey = resp;
          return resp;
        }
      }
    }
  }

  // 2. Generic emotion responses
  if(analysis.topics.length === 0 && G.round > 2){
    var emo = topicResponses.emotion;
    if(G.emotion < 35 && Math.random() < 0.5){
      resp = pickNoRepeat(emo.hurt, 'eh_' + pk);
      if(resp !== G.hMsgs[G.hMsgs.length - 1]){ G.lastRespKey = resp; return resp; }
    }
    if(G.emotion > 60 && Math.random() < 0.4){
      resp = pickNoRepeat(emo.soft, 'es_' + pk);
      if(resp !== G.hMsgs[G.hMsgs.length - 1]){ G.lastRespKey = resp; return resp; }
    }
    if(Math.random() < 0.3){
      resp = pickNoRepeat(emo.contradiction, 'ec_' + pk);
      if(resp !== G.hMsgs[G.hMsgs.length - 1]){ G.lastRespKey = resp; return resp; }
    }
    if(analysis.neg.length > 0 && Math.random() < 0.4){
      resp = pickNoRepeat(emo.sarcasm, 'ea_' + pk);
      if(resp !== G.hMsgs[G.hMsgs.length - 1]){ G.lastRespKey = resp; return resp; }
    }
  }

  // 3. Keyword matching
  for(var ni = 0; ni < analysis.neg.length; ni++){
    var c = analysis.neg[ni];
    var k = 'n_' + c;
    if(ph[k]){
      resp = pickNoRepeat(ph[k], 'n_' + c + '_' + pk);
      if(resp !== G.hMsgs[G.hMsgs.length - 1]){ G.lastRespKey = resp; return resp; }
    }
  }
  for(var pi = 0; pi < analysis.pos.length; pi++){
    var c2 = analysis.pos[pi];
    var k2 = 'p_' + c2;
    if(ph[k2]){
      resp = pickNoRepeat(ph[k2], 'p_' + c2 + '_' + pk);
      if(resp !== G.hMsgs[G.hMsgs.length - 1]){ G.lastRespKey = resp; return resp; }
    }
  }

  // 4. Neutral
  resp = pickNoRepeat(ph.neutral, 'neut_' + pk);
  G.lastRespKey = resp;
  return resp;
}

// ===== Ending =====

  } else if(G.understanding >= 30){
    icon = '🌫️'; title = '未完的对话';

    root = '分手的根本原因隐藏在无数被忽略的细节里——她换了发型你没注意，她说不舒服你只回了"多喝热水"，她想说话的时候你在看手机。这些小事累积起来，就成了无法跨越的距离。';
  } else {
    icon = '🍂'; title = '渐行渐远';

    root = '分手的根本原因是：你们之间的沟通从来都不在一个频道上。她说的是感受，你回的是道理。她要的是陪伴，你给的是解决方案。方向不同，再努力也只会越来越远。';
  }

  setTimeout(function(){
    switchScene('ending-scene');
    document.getElementById('end-wrap').innerHTML =
      '<div class="end-icon">' + icon + '</div>' +
      '<div class="end-title">' + title + '</div>' +
      '<div class="end-text">' + text.replace(/\n/g, '<br>') + '</div>' +
      '<div class="end-root">' +
        '<div class="end-root-label">根 本 原 因</div>' +
        '<div class="end-root-text">' + root + '</div>' +
      '</div>' +

  }, 2000);
}
