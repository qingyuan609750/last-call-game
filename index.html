<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最后一通电话</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #08080d;
    --text-primary: #d8d5d0;
    --text-secondary: #6a6a7a;
    --accent-warm: #c9a96e;
    --accent-cold: #6e8fc9;
    --accent-red: #b85450;
    --accent-green: #6ec98a;
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ===== 雨滴背景 ===== */
  #rain-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; opacity: 0.3;
  }

  /* ===== 场景 ===== */
  .scene {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
  }
  .scene.active { display: flex; animation: fadeIn 1s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes breathe { 0%,100% { opacity: 0.15; } 50% { opacity: 0.35; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-2px)} 40%{transform:translateX(2px)} 60%{transform:translateX(-1px)} 80%{transform:translateX(1px)} }
  @keyframes callPulse { 0%{box-shadow:0 0 0 0 rgba(201,169,110,0.4)} 70%{box-shadow:0 0 0 20px rgba(201,169,110,0)} 100%{box-shadow:0 0 0 0 rgba(201,169,110,0)} }

  .screen-shake { animation: shake 0.3s ease; }

  /* ===== 标题页 ===== */
  #title-scene {
    background: radial-gradient(ellipse at 50% 80%, rgba(25,18,35,0.9) 0%, var(--bg-dark) 70%);
  }
  .title-container { text-align: center; animation: slideUp 1.4s ease; }
  .title-sub {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px; color: var(--text-secondary);
    letter-spacing: 10px; margin-bottom: 24px;
  }
  .title-main {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(32px,5.5vw,52px);
    font-weight: 700; margin-bottom: 10px; line-height: 1.4;
  }
  .title-line {
    width: 30px; height: 1px; background: rgba(201,169,110,0.3);
    margin: 20px auto;
  }
  .title-desc {
    font-size: 14px; color: var(--text-secondary);
    max-width: 380px; margin: 0 auto 48px;
    line-height: 2; font-weight: 300;
  }
  .title-btn {
    display: inline-block; padding: 14px 52px;
    border: 1px solid rgba(201,169,110,0.35);
    background: rgba(201,169,110,0.06);
    color: var(--accent-warm);
    font-family: 'Noto Serif SC', serif;
    font-size: 15px; cursor: pointer;
    transition: all 0.4s; letter-spacing: 6px;
    position: relative;
  }
  .title-btn:hover {
    background: rgba(201,169,110,0.12);
    border-color: rgba(201,169,110,0.6);
  }
  .title-btn::after {
    content: ''; position: absolute; inset: -4px;
    border: 1px solid rgba(201,169,110,0.1);
    animation: callPulse 2s infinite; pointer-events: none;
  }
  .title-hint {
    margin-top: 36px; font-size: 11px;
    color: rgba(138,138,154,0.35); animation: pulse 3s infinite;
  }

  /* ===== 前情场景 ===== */
  #prologue-scene {
    background: radial-gradient(ellipse at 50% 60%, rgba(18,14,28,0.95) 0%, var(--bg-dark) 70%);
    padding: 0;
  }
  .prologue-wrap {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 40px; position: relative;
  }
  .prologue-ch {
    font-family: 'Noto Serif SC', serif;
    font-size: 12px; letter-spacing: 8px;
    margin-bottom: 10px; transition: all 0.8s;
  }
  .prologue-ch.her { color: var(--accent-warm); }
  .prologue-ch.his { color: var(--accent-cold); }
  .prologue-sp {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px; font-weight: 600;
    margin-bottom: 28px; transition: all 0.8s;
  }
  .prologue-sp.her { color: var(--accent-warm); }
  .prologue-sp.his { color: var(--accent-cold); }
  .prologue-body {
    max-width: 520px; width: 100%; min-height: 180px;
  }
  .prologue-line {
    font-size: 14.5px; line-height: 2.4;
    color: var(--text-primary); font-weight: 300;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.7s ease, transform 0.7s ease;
    display: block; margin-bottom: 2px;
  }
  .prologue-line.show { opacity: 1; transform: translateY(0); }
  .prologue-dots {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%); display: flex; gap: 8px;
  }
  .prologue-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.08); transition: all 0.4s;
  }
  .prologue-dots span.on { background: rgba(201,169,110,0.45); transform: scale(1.3); }
  .prologue-dots span.done { background: rgba(201,169,110,0.2); }
  .prologue-skip {
    position: absolute; bottom: 24px; right: 28px;
    font-size: 11px; color: rgba(138,138,154,0.3);
    cursor: pointer; padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 4px; background: transparent;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.3s; z-index: 30;
  }
  .prologue-skip:hover { color: rgba(138,138,154,0.6); }

  /* ===== 游戏场景 ===== */
  #game-scene {
    flex-direction: column; padding: 0;
    background: radial-gradient(ellipse at 50% 20%, rgba(20,16,30,0.5) 0%, var(--bg-dark) 50%);
  }

  /* 通话状态栏 */
  .call-bar {
    width: 100%; padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(8,8,13,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    z-index: 20;
  }
  .call-info { display: flex; align-items: center; gap: 10px; }
  .call-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #3a2a4c, #221a30);
    border: 1px solid rgba(201,169,110,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--accent-warm);
  }
  .call-name { font-size: 13px; font-weight: 500; }
  .call-status { font-size: 11px; color: var(--text-secondary); }
  .call-status .dot {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: var(--accent-green);
    margin-right: 4px; animation: pulse 2s infinite;
  }
  .call-timer {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px; color: var(--text-secondary);
    letter-spacing: 1px;
  }
  .call-round {
    font-size: 11px; color: rgba(138,138,154,0.4);
    text-align: right; margin-top: 2px;
  }

  /* 情绪指示 */
  .emotion-strip {
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.03);
    transition: background 1s ease;
  }

  /* 对话区域 */
  .dialogue-area {
    flex: 1; width: 100%; max-width: 660px;
    margin: 0 auto; padding: 20px 20px 10px;
    overflow-y: auto; display: flex;
    flex-direction: column; gap: 12px;
    scrollbar-width: none;
  }
  .dialogue-area::-webkit-scrollbar { display: none; }

  /* 时间戳 */
  .timestamp {
    text-align: center; font-size: 11px;
    color: rgba(138,138,154,0.25);
    padding: 8px 0; animation: slideUp 0.5s ease;
  }

  /* 消息 */
  .msg {
    display: flex; gap: 10px;
    animation: slideUp 0.4s ease;
    max-width: 82%;
  }
  .msg.me { align-self: flex-end; flex-direction: row-reverse; }
  .msg.sys { align-self: center; max-width: 100%; }

  .ava {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
  }
  .ava.her {
    background: linear-gradient(135deg, #3a2a4c, #221a30);
    border: 1px solid rgba(201,169,110,0.2);
    color: var(--accent-warm);
  }
  .ava.me {
    background: linear-gradient(135deg, #2a3545, #1a2530);
    border: 1px solid rgba(110,143,201,0.2);
    color: var(--accent-cold);
  }

  .bbl {
    padding: 10px 16px; border-radius: 14px;
    font-size: 14px; line-height: 1.8; position: relative;
  }
  .msg.her .bbl {
    background: rgba(35,30,48,0.6);
    border: 1px solid rgba(255,255,255,0.04);
    border-top-left-radius: 4px;
  }
  .msg.me .bbl {
    background: rgba(30,40,58,0.6);
    border: 1px solid rgba(110,143,201,0.1);
    border-top-right-radius: 4px;
  }
  .msg.sys .bbl {
    background: transparent; border: none;
    color: var(--text-secondary);
    font-size: 12px; font-style: italic;
    text-align: center; padding: 6px 12px;
  }

  /* 消息淡入动画 */
  .msg { animation: msgFadeIn 0.6s ease forwards; }
  @keyframes msgFadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 打字指示器 */
  .typing-dots {
    display: flex; gap: 4px; padding: 10px 16px;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    background: var(--text-secondary);
    border-radius: 50%; opacity: 0.3;
    animation: pulse 1.6s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* 逐字光标 */
  .typing-cursor {
    display: inline-block; width: 2px; height: 14px;
    background: var(--accent-warm);
    margin-left: 1px; vertical-align: middle;
    animation: pulse 0.8s infinite;
  }

  /* 沉默气泡 */
  .silence {
    font-size: 13px; color: rgba(138,138,154,0.3);
    font-style: italic; padding: 4px 0;
    animation: breathe 3s infinite;
  }

  /* 输入区域 */
  .input-area {
    width: 100%; padding: 12px 20px 20px;
    background: rgba(8,8,13,0.85);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  .input-wrap {
    max-width: 660px; margin: 0 auto;
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-box { flex: 1; }
  #user-input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px; outline: none;
    resize: none; min-height: 44px; max-height: 100px;
    transition: border-color 0.3s; line-height: 1.5;
  }
  #user-input:focus { border-color: rgba(201,169,110,0.2); }
  #user-input::placeholder { color: rgba(138,138,154,0.25); }
  #user-input:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn {
    padding: 12px 22px;
    background: rgba(201,169,110,0.08);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 10px; color: var(--accent-warm);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: all 0.3s; white-space: nowrap;
  }
  .send-btn:hover:not(:disabled) {
    background: rgba(201,169,110,0.15);
  }
  .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  .input-hint {
    text-align: center; font-size: 10px;
    color: rgba(138,138,154,0.2); margin-top: 6px;
  }

  /* ===== 结局 ===== */
  #ending-scene {
    background: radial-gradient(ellipse at 50% 50%, rgba(18,14,28,0.95) 0%, var(--bg-dark) 70%);
  }
  .end-wrap {
    text-align: center; max-width: 520px;
    padding: 40px; animation: slideUp 1.2s ease;
  }
  .end-icon { font-size: 40px; margin-bottom: 20px; }
  .end-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(22px,3.5vw,32px);
    font-weight: 600; margin-bottom: 18px; line-height: 1.5;
  }
  .end-text {
    font-size: 14px; color: var(--text-secondary);
    line-height: 2.2; margin-bottom: 14px; font-weight: 300;
  }
  .end-root {
    margin: 28px 0; padding: 18px 22px;
    background: rgba(201,169,110,0.04);
    border: 1px solid rgba(201,169,110,0.1);
    border-radius: 10px;
  }
  .end-root-label {
    font-size: 11px; color: var(--accent-warm);
    letter-spacing: 4px; margin-bottom: 8px;
  }
  .end-root-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 14.5px; color: var(--text-primary); line-height: 2;
  }
  .end-stats {
    display: flex; justify-content: center;
    gap: 28px; margin: 20px 0;
  }
  .st-val {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px; font-weight: 600; color: var(--accent-warm);
  }
  .st-lab { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .end-btn {
    display: inline-block; padding: 12px 36px;
    border: 1px solid rgba(201,169,110,0.25);
    background: rgba(201,169,110,0.04);
    color: var(--accent-warm);
    font-family: 'Noto Serif SC', serif;
    font-size: 13px; cursor: pointer;
    transition: all 0.4s; letter-spacing: 4px; margin-top: 16px;
  }
  .end-btn:hover { background: rgba(201,169,110,0.1); }

  @media(max-width:600px){
    .call-bar{padding:10px 14px}
    .dialogue-area{padding:14px}
    .input-area{padding:10px 14px 14px}
    .msg{max-width:90%}
    .end-wrap{padding:24px}
    .end-stats{gap:16px}
  }
</style>
</head>
<body>

<canvas id="rain-canvas"></canvas>

<!-- 标题页 -->
<div id="title-scene" class="scene active">
  <div class="title-container">
    <div class="title-sub">一 段 关 于 告 别 的 对 话</div>
    <div class="title-main">最后一通电话</div>
    <div class="title-line"></div>
    <div class="title-desc">
      深夜十一点十七分。<br>
      她打来电话。<br>
      你有十二句话的时间，<br>
      去理解她为什么要离开。
    </div>
    <button class="title-btn" onclick="startPrologue()">接 听 电 话</button>
    <div class="title-hint">戴上耳机 · 效果更佳</div>
  </div>
</div>

<!-- 前情 -->
<div id="prologue-scene" class="scene">
  <div class="prologue-wrap">
    <div class="prologue-ch her" id="p-ch"></div>
    <div class="prologue-sp her" id="p-sp"></div>
    <div class="prologue-body" id="p-body"></div>
    <div class="prologue-dots" id="p-dots"></div>
    <button class="prologue-skip" onclick="skipPrologue()">跳过 →</button>
  </div>
</div>

<!-- 游戏 -->
<div id="game-scene" class="scene">
  <div class="call-bar">
    <div class="call-info">
      <div class="call-avatar">她</div>
      <div>
        <div class="call-name">她</div>
        <div class="call-status"><span class="dot"></span>通话中</div>
      </div>
    </div>
    <div style="text-align:right">
      <div class="call-timer" id="call-timer">23:17</div>
      <div class="call-round">第 <span id="round-num">1</span> / 12 句</div>
    </div>
    <button id="music-btn" onclick="toggleMusic()" style="position:absolute;top:14px;left:50%;transform:translateX(-50%);background:none;border:1px solid rgba(255,255,255,0.08);color:rgba(201,169,110,0.5);font-size:16px;padding:4px 12px;border-radius:12px;cursor:pointer;transition:all 0.3s;opacity:0.3" title="背景音乐">♪</button>
  </div>
  <div class="emotion-strip" id="emotion-strip"></div>
  <div class="dialogue-area" id="dialogue-area"></div>
  <div class="input-area">
    <div class="input-wrap">
      <div class="input-box">
        <textarea id="user-input" placeholder="说点什么……" rows="1" onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">发送</button>
    </div>
    <div class="input-hint">Enter 发送 · 剩余 <span id="remaining">12</span> 句</div>
  </div>
</div>

<!-- 结局 -->
<div id="ending-scene" class="scene">
  <div class="end-wrap" id="end-wrap"></div>
</div>

<script>
// ===== 雨滴背景 =====
const rc = document.getElementById('rain-canvas');
const rx = rc.getContext('2d');
function resizeRc(){ rc.width=innerWidth; rc.height=innerHeight; }
resizeRc(); addEventListener('resize', resizeRc);

class Rain {
  constructor(){ this.reset(); }
  reset(){
    this.x = Math.random()*rc.width;
    this.y = Math.random()*rc.height - rc.height;
    this.len = Math.random()*18+8;
    this.speed = Math.random()*4+3;
    this.opacity = Math.random()*0.15+0.03;
  }
  update(){
    this.y += this.speed;
    if(this.y > rc.height) this.reset();
  }
  draw(){
    rx.beginPath();
    rx.moveTo(this.x, this.y);
    rx.lineTo(this.x+0.5, this.y+this.len);
    rx.strokeStyle = `rgba(150,160,200,${this.opacity})`;
    rx.lineWidth = 0.5;
    rx.stroke();
  }
}
const drops = Array.from({length:80}, ()=>new Rain());
function drawRain(){
  rx.clearRect(0,0,rc.width,rc.height);
  drops.forEach(d=>{d.update();d.draw();});
  requestAnimationFrame(drawRain);
}
drawRain();

// ===== 音频 =====
let audioCtx = null;
function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function playTone(freq, dur, vol=0.02){
  if(!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  } catch(e){}
}
function playSendSound(){ playTone(800, 0.08, 0.03); setTimeout(()=>playTone(1000, 0.08, 0.03), 80); }
function playReceiveSound(){ playTone(600, 0.06, 0.02); setTimeout(()=>playTone(500, 0.1, 0.02), 60); }
function playBadSound(){ playTone(200, 0.3, 0.03); }
function playGoodSound(){ playTone(500, 0.15, 0.02); setTimeout(()=>playTone(700, 0.2, 0.02), 150); }

// ===== 背景音乐系统（恋人风格钢琴氛围曲）=====
let bgMusicPlaying = false;
let bgMusicGain = null;
let bgMusicInterval = null;

function startBgMusic(){
  if(bgMusicPlaying || !audioCtx) return;
  bgMusicPlaying = true;
  bgMusicGain = audioCtx.createGain();
  bgMusicGain.gain.value = 0.08;
  bgMusicGain.connect(audioCtx.destination);

  // 《恋人》风格：更急促、更情绪化
  // 和弦进行：Am - F - C - G（加快节奏）
  const chords = [
    [220.00, 261.63, 329.63],  // Am
    [174.61, 220.00, 261.63],  // F
    [261.63, 329.63, 392.00],  // C
    [196.00, 246.94, 293.66],  // G
  ];
  const highNotes = [
    [440.00, 523.25, 659.25],
    [349.23, 440.00, 523.25],
    [523.25, 659.25, 783.99],
    [392.00, 493.88, 587.33],
  ];
  // 旋律线（更高音，增加情绪张力）
  const melodyNotes = [
    659.25, 587.33, 523.25, 493.88, 440.00, 392.00, 440.00, 523.25,
    587.33, 523.25, 440.00, 392.00, 349.23, 329.63, 392.00, 440.00,
    523.25, 587.33, 659.25, 587.33, 523.25, 440.00, 392.00, 349.23,
    329.63, 392.00, 440.00, 523.25, 493.88, 440.00, 392.00, 329.63
  ];
  let melodyIdx = 0;

  let chordIdx = 0;

  function playNote(freq, startTime, duration, vol){
    if(!audioCtx || !bgMusicPlaying) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.value = freq;

    filter.type = 'lowpass';
    filter.frequency.value = 2500;
    filter.Q.value = 0.8;

    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.03);
    gain.gain.setValueAtTime(vol * 0.8, startTime + duration * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(bgMusicGain);

    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
  }

  function playChord(){
    if(!bgMusicPlaying) return;
    const chord = chords[chordIdx % chords.length];
    const high = highNotes[chordIdx % highNotes.length];
    const now = audioCtx.currentTime;

    // 分解和弦（更紧凑，间隔0.5秒）
    chord.forEach((freq, i) => {
      playNote(freq, now + i * 0.5, 2.0, 0.18);
    });

    // 旋律线（每拍一个音，更急促）
    for(let i = 0; i < 4; i++){
      const mNote = melodyNotes[(melodyIdx + i) % melodyNotes.length];
      playNote(mNote, now + i * 0.6 + 0.3, 1.2, 0.07);
    }
    melodyIdx += 4;

    // 高八度装饰
    if(Math.random() < 0.4){
      const hNote = high[Math.floor(Math.random() * high.length)];
      playNote(hNote, now + 1.5, 1.5, 0.05);
    }

    // 低音（每两个和弦一次）
    if(chordIdx % 2 === 0){
      playNote(chord[0] / 2, now, 2.5, 0.1);
    }

    chordIdx++;
  }

  // 每2.4秒一个和弦（比之前3.2秒更急促）
  playChord();
  bgMusicInterval = setInterval(playChord, 2400);
}

function stopBgMusic(){
  bgMusicPlaying = false;
  if(bgMusicInterval) clearInterval(bgMusicInterval);
  if(bgMusicGain){
    bgMusicGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 1);
    setTimeout(()=>{
      try{ bgMusicGain.disconnect(); } catch(e){}
      bgMusicGain = null;
    }, 1200);
  }
}

let callSeconds = 0;
let callTimerInterval = null;
function startCallTimer(){
  callSeconds = 0;
  updateCallTimer();
  callTimerInterval = setInterval(()=>{
    callSeconds++;
    updateCallTimer();
  }, 1000);
}
function updateCallTimer(){
  const m = Math.floor(callSeconds/60);
  const s = callSeconds%60;
  const baseM = 23, baseS = 17;
  let tm = baseM + m, ts = baseS + s;
  if(ts >= 60){ tm++; ts -= 60; }
  document.getElementById('call-timer').textContent =
    String(tm).padStart(2,'0') + ':' + String(ts).padStart(2,'0');
}
function stopCallTimer(){ clearInterval(callTimerInterval); }

function sendMsg(){
  const input=document.getElementById('user-input');
  const text=input.value.trim();
  if(!text||G.round>=MAX_ROUNDS) return;

  input.value=''; input.style.height='auto';
  disableInput();
  G.round++;
  addPlayerMsg(text);
  playSendSound();
  updateUI();

  // 分析输入
  const analysis = analyze(text);
  G.lastPlayerText = text;

  // 废话/乱发处理：不消耗回合，直接怼回去
  if(analysis.spam || analysis.nonsense){
    G.spamCount = (G.spamCount||0) + 1;
    const spamResp = G.spamCount >= 3
      ? '……我挂了。你连认真对待这通电话都做不到。'
      : G.spamCount === 2
        ? '你能不能认真一点？我大半夜打给你，你就在这发这些？'
        : analysis.spam
          ? pick(['……你说什么呢？','你认真的吗？','……你是在逗我吗？','你能不能正常说话？'])
          : pick(['……嗯。','……好吧。','你就不能多说几个字吗？','你到底想不想聊？']);
    addSilence('……');
    typeHerMsg(spamResp, ()=>{
      if(G.spamCount >= 3){
        setTimeout(()=> showEnding(), 2000);
      } else {
        setTimeout(()=> enableInput(), 800);
      }
    });
    return;
  }

  updateEmotion(analysis);
  updateUnderstanding(analysis);
  updatePhase();
  updateEmotionStrip();

  // 等待一下再回复（模拟电话中的沉默）
  const silenceDelay = 1500 + Math.random()*1500;

  // 有时插入沉默
  if(G.round > 2 && Math.random() < 0.3 && G.emotion < 60){
    setTimeout(()=> addSilence('……'), 800);
  }

  // 屏幕震动（负面输入时）
  if(analysis.neg.length > 0){
    setTimeout(()=>{
      document.getElementById('game-scene').classList.add('screen-shake');
      playBadSound();
      setTimeout(()=>document.getElementById('game-scene').classList.remove('screen-shake'), 300);
    }, 600);
  }

  // 正面输入时的微妙反馈
  if(analysis.pos.length >= 2 && analysis.neg.length === 0){
    setTimeout(()=> playGoodSound(), 1000);
  }

  setTimeout(()=>{
    const resp = genResponse(text, analysis);
    typeHerMsg(resp, ()=>{
      updateUI();

      // 检查结束
      if(G.round>=MAX_ROUNDS || G.emotion<=8 || G.emotion>=96){
        setTimeout(()=> showEnding(), 2500);
      } else {
        setTimeout(()=> enableInput(), 800);
      }
    });
  }, silenceDelay);
}

// ===== 上下文感知分析 =====
function analyze(text){
  const r = { pos:[], neg:[], q: text.includes('？')||text.includes('?'), long: text.length>25, topics:[], nonsense:false, spam:false };
  const t = text.trim();

  // ===== 废话/乱发检测 =====
  // 太短且无意义
  if(t.length <= 2 && !/吗|呢|啊|哦|嗯|哈|吧|呀|嘛|噢|喔/.test(t)){
    r.nonsense = true;
  }
  // 纯标点/符号/数字
  if(/^[\d\s\W]+$/.test(t) && t.length < 5){
    r.nonsense = true;
  }
  // 乱码/无意义重复
  if(/(.)\1{4,}/.test(t)){
    r.spam = true;
  }
  // 明显不相关的内容（表情包、网络用语、广告等）
  const spamPatterns = /哈哈|笑死|666|牛逼|nb|草|艹|卧槽|wtf|lol|hhh|233|111|000|???|！！！|？？？|。。。|.../;
  if(spamPatterns.test(t) && t.length < 10){
    r.spam = true;
  }
  // 完全不相关的关键词
  const irrelevant = /天气|股票|比特币|游戏|王者|联盟|抖音|快手|外卖|快递|淘宝|拼多多|支付宝|微信红包|彩票|足球|篮球|nba|cba|电影|综艺|明星|偶像|追剧|番剧|动漫|漫画|小说|作业|考试|论文|毕业|老师|同学|上课|下课|食堂|宿舍|图书馆|快递|外卖|打车|地铁|公交|机票|酒店|旅游|攻略|菜谱|健身|减肥|化妆|护肤|衣服|鞋子|包包|手机壳|充电宝|耳机|键盘|鼠标|电脑|显示器|打印机|路由器|wifi|密码|流量|话费|充值|转账|红包|借钱|贷款|信用卡|花呗|借呗|公积金|社保|医保|驾照|违章|停车|加油|充电|洗车|保养|保险|装修|搬家|租房|买房|卖房|中介|物业|水电费|燃气费|暖气费/;
  if(irrelevant.test(t) && !r.topics.length){
    r.spam = true;
  }
  // 重复发送相同内容
  if(G.lastPlayerText === t){
    r.spam = true;
  }

  // 话题检测
  if(/工作|上班|加班|忙|客户|事业|赚钱|养家/.test(t)){ r.topics.push('work'); G.topics.add('work'); }
  if(/小孩|长不大|成熟|幼稚|任性|矫情|懂事/.test(t)){ r.topics.push('mature'); G.topics.add('mature'); }
  if(/付出|对你好|买了|礼物|钱|花|养/.test(t)){ r.topics.push('effort'); G.topics.add('effort'); }
  if(/吵架|闹|脾气|凶|吼|骂/.test(t)){ r.topics.push('fight'); G.topics.add('fight'); }
  if(/手机|游戏|打排位|刷|看手机/.test(t)){ r.topics.push('phone'); G.topics.add('phone'); }
  if(/朋友|兄弟|出去玩|社交/.test(t)){ r.topics.push('social'); G.topics.add('social'); }
  if(/爱|喜欢|感情|在一起|分手|离开/.test(t)){ r.topics.push('love'); G.topics.add('love'); }
  if(/沟通|说话|聊天|交流|听/.test(t)){ r.topics.push('comm'); G.topics.add('comm'); }
  if(/别人|别的女生|男的|出轨|绿/.test(t)){ r.topics.push('jealousy'); G.topics.add('jealousy'); }
  if(/未来|以后|结婚|打算|规划/.test(t)){ r.topics.push('future'); G.topics.add('future'); }

  const posKW = {
    care:['怎么了','发生什么','担心','在意','心疼','难受','不开心','委屈','辛苦','累了','压力','撑不住','不好受','还好吗','你没事吧','哪里不舒服'],
    listen:['你说','告诉我','我在听','想听','慢慢说','不急','愿意听','你说吧','讲讲','倾诉','聊聊','听着呢','我听着'],
    reflect:['我的错','是我不好','对不起','抱歉','忽略','忽视','没注意','不够','做得不好','没做好','疏忽','粗心','不上心','是我的问题','怪我'],
    understand:['理解','明白','懂','能理解','可以理解','换位','你的感受','你的心情','我懂','我理解你','换位思考'],
    admit:['确实','你说得对','你说得没错','我承认','我有责任','我没有做好','是我的错','你说得有道理','你说到点子上了'],
    change:['改变','改','以后会','不会再','我会努力','给我机会','让我改','重新开始','我想变好'],
    dig:['为什么','原因','真的只是','是不是还有','还有什么','真正','其实','心里','内心','一直','从来','从没','到底','根本'],
    validate:['你有道理','可以理解你','你说的对','难怪','怪不得','你受委屈了','辛苦你了','难怪你会','是我疏忽了']
  };
  const negKW = {
    deny:['你想多了','没那么严重','至于吗','小题大做','太敏感','别闹','无理取闹','矫情','作','任性','你想太多了'],
    blame:['你也是','你也有问题','你为什么不','你自己','你也','你总是','你从来不','你从来没','你还好意思'],
    impatient:['快点说','别绕弯子','有话直说','到底想怎样','能不能','别磨蹭','直接点','说重点','别废话'],
    dismiss:['没事','没什么大不了','过几天就好了','别想了','睡一觉','算了','多大点事','别放在心上','别在意'],
    attack:['你才','你凭什么','你有什么资格','你看看你自己','长不大的小孩'],
    escape:['明天再说','改天聊','现在不想','我累了','我困了','我忙','以后再说','回头再说','不想聊了'],
    guilt:['我对你那么好','我付出了那么多','你知不知道','我为了你','你良心','我对得起你','我付出了']
  };

  for(const [cat,kws] of Object.entries(posKW)){
    for(const kw of kws){ if(t.includes(kw)){ r.pos.push(cat); G.kw.add(cat); break; } }
  }
  for(const [cat,kws] of Object.entries(negKW)){
    for(const kw of kws){ if(t.includes(kw)){ r.neg.push(cat); break; } }
  }
  return r;
}

function updateEmotion(a){
  let d=0;
  if(a.pos.includes('care')) d+=5;
  if(a.pos.includes('listen')) d+=7;
  if(a.pos.includes('reflect')) d+=8;
  if(a.pos.includes('understand')) d+=7;
  if(a.pos.includes('admit')) d+=9;
  if(a.pos.includes('validate')) d+=10;
  if(a.pos.includes('dig')) d+=5;
  if(a.pos.includes('change')) d+=2;
  if(a.neg.includes('deny')) d-=14;
  if(a.neg.includes('blame')) d-=12;
  if(a.neg.includes('impatient')) d-=13;
  if(a.neg.includes('dismiss')) d-=15;
  if(a.neg.includes('attack')) d-=16;
  if(a.neg.includes('escape')) d-=14;
  if(a.neg.includes('guilt')) d-=11;
  if(a.pos.length===0 && a.neg.length===0) d-=4;
  if(a.long && a.pos.length>0) d+=2;
  if(a.q && a.pos.length>0) d+=2;
  G.emotion = Math.max(0, Math.min(100, G.emotion+d));
}

function updateUnderstanding(a){
  let d=0;
  if(a.pos.includes('dig')) d+=13;
  if(a.pos.includes('understand')) d+=11;
  if(a.pos.includes('reflect')) d+=9;
  if(a.pos.includes('admit')) d+=11;
  if(a.pos.includes('validate')) d+=13;
  if(a.pos.includes('care')) d+=5;
  if(a.pos.includes('listen')) d+=7;
  if(a.neg.length>0) d-=6;
  G.understanding = Math.max(0, Math.min(100, G.understanding+d));
  if(G.understanding>=60 && !G.rootFound) G.rootFound=true;
}

function updatePhase(){
  if(G.emotion>=75 && G.phase<2) G.phase=2;
  else if(G.emotion>=55 && G.phase<1) G.phase=1;
  if(G.emotion<=20) G.phase=-1;
}

function updateEmotionStrip(){
  const strip = document.getElementById('emotion-strip');
  if(G.emotion<=20) strip.style.background='rgba(110,143,201,0.4)';
  else if(G.emotion<=40) strip.style.background='rgba(138,138,154,0.2)';
  else if(G.emotion<=60) strip.style.background='rgba(201,169,110,0.3)';
  else if(G.emotion<=80) strip.style.background='rgba(110,201,138,0.3)';
  else strip.style.background='rgba(201,169,110,0.5)';
}

function updateUI(){
  document.getElementById('round-num').textContent=G.round;
  document.getElementById('remaining').textContent=MAX_ROUNDS-G.round;
}

function pickNoRepeat(arr, prefix){
  const available = arr.filter((_, i) => !G.usedResp.has(prefix+'_'+i));
  if(available.length === 0){
    arr.forEach((_, i) => G.usedResp.delete(prefix+'_'+i));
    return pick(arr);
  }
  const idx = arr.indexOf(available[Math.floor(Math.random()*available.length)]);
  G.usedResp.add(prefix+'_'+idx);
  return arr[idx];
}

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function genResponse(playerText, analysis){
  let pk = G.phase===-1?'p0':G.phase===0?'p0':G.phase===1?'p1':'p2';
  const ph = R[pk];
  let resp = '';

  // 0. 随机情绪波动（10%概率触发，增加"不讲理"感）
  if(G.round > 3 && Math.random() < 0.12){
    const swing = pick(moodSwings);
    resp = pickNoRepeat(swing.responses, 'swing_'+swing.trigger+'_'+pk);
    if(resp !== G.hMsgs[G.hMsgs.length-1]){
      G.lastRespKey = resp;
      return resp;
    }
  }

  // 1. 话题感知回复
  if(analysis.topics.length > 0){
    for(const topic of analysis.topics){
      const tr = topicResponses[topic];
      if(!tr) continue;

      // 有twist（反转）回复时，30%概率使用
      if(tr.twist && Math.random() < 0.3){
        resp = pickNoRepeat(tr.twist, 'tw_'+topic+'_'+pk);
        if(resp !== G.hMsgs[G.hMsgs.length-1]){
          G.lastRespKey = resp;
          return resp;
        }
      }

      if(analysis.neg.length > 0 && tr.negative){
        resp = pickNoRepeat(tr.negative, 'tn_'+topic+'_'+pk);
        if(resp !== G.hMsgs[G.hMsgs.length-1]){
          G.lastRespKey = resp;
          return resp;
        }
      }
      if(analysis.pos.length > 0 && tr.positive){
        resp = pickNoRepeat(tr.positive, 'tp_'+topic+'_'+pk);
        if(resp !== G.hMsgs[G.hMsgs.length-1]){
          G.lastRespKey = resp;
          return resp;
        }
      }
      if(tr.responses){
        resp = pickNoRepeat(tr.responses, 'tr_'+topic+'_'+pk);
        if(resp !== G.hMsgs[G.hMsgs.length-1]){
          G.lastRespKey = resp;
          return resp;
        }
      }
    }
  }

  // 2. 通用情绪回复（无特定话题时）
  if(analysis.topics.length === 0 && G.round > 2){
    const emo = topicResponses.emotion;
    if(G.emotion < 35 && Math.random() < 0.5){
      resp = pickNoRepeat(emo.hurt, 'eh_'+pk);
      if(resp !== G.hMsgs[G.hMsgs.length-1]){ G.lastRespKey = resp; return resp; }
    }
    if(G.emotion > 60 && Math.random() < 0.4){
      resp = pickNoRepeat(emo.soft, 'es_'+pk);
      if(resp !== G.hMsgs[G.hMsgs.length-1]){ G.lastRespKey = resp; return resp; }
    }
    if(Math.random() < 0.3){
      resp = pickNoRepeat(emo.contradiction, 'ec_'+pk);
      if(resp !== G.hMsgs[G.hMsgs.length-1]){ G.lastRespKey = resp; return resp; }
    }
    if(analysis.neg.length > 0 && Math.random() < 0.4){
      resp = pickNoRepeat(emo.sarcasm, 'ea_'+pk);
      if(resp !== G.hMsgs[G.hMsgs.length-1]){ G.lastRespKey = resp; return resp; }
    }
  }

  // 3. 关键词匹配回复（带去重）
  for(const c of analysis.neg){
    const k='n_'+c;
    if(ph[k]){
      resp = pickNoRepeat(ph[k], 'n_'+c+'_'+pk);
      if(resp !== G.hMsgs[G.hMsgs.length-1]){ G.lastRespKey = resp; return resp; }
    }
  }
  for(const c of analysis.pos){
    const k='p_'+c;
    if(ph[k]){
      resp = pickNoRepeat(ph[k], 'p_'+c+'_'+pk);
      if(resp !== G.hMsgs[G.hMsgs.length-1]){ G.lastRespKey = resp; return resp; }
    }
  }

  // 4. 中性回复（带去重）
  resp = pickNoRepeat(ph.neutral, 'neut_'+pk);
  G.lastRespKey = resp;
  return resp;
}

      <div class="end-stats">
        <div><div class="st-val">${G.round}</div><div class="st-lab">对话回合</div></div>
        <div><div class="st-val">${G.emotion}%</div><div class="st-lab">她的情绪</div></div>
        <div><div class="st-val">${G.understanding}%</div><div class="st-lab">你的理解</div></div>
      </div>
      <button class="end-btn" onclick="startPrologue()">再 试 一 次</button>
    `;
  }, 2000);
}

// ===== 输入框自适应 =====
document.getElementById('user-input').addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
});
</script>
</body>
